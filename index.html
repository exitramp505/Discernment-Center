<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Discernment Center Assessment</title><link rel="stylesheet" href="style.css"></head><body><main><section class="hero"><h1>Discernment Center Candidate Assessment</h1><p>This assessment helps summarize character qualities for ministry discernment. Answer honestly based on what is currently evident.</p></section><form id="assessmentForm"><div class="card"><h2>Candidate Information</h2><label>Full Name<input name="name" required></label><label>Email<input name="email" type="email" required></label><label>Phone<input name="phone" required></label><label>State<select name="state" id="state" required></select></label><label>Are you married?<select name="married" id="married" required><option value="">Select</option><option>Yes</option><option>No</option></select></label></div><div id="questions"></div><div class="card hidden" id="reflectionCard"><h2>Reflection Questions</h2><label>What strengths do you believe you bring to ministry leadership?<textarea name="strengths"></textarea></label><label>What areas do you believe need further development?<textarea name="growth"></textarea></label><label>What concerns or questions do you have about this discernment process?<textarea name="concerns"></textarea></label><label>Is there anything else you want the Discernment Center team to know?<textarea name="other"></textarea></label></div><button id="generateReportBtn" class="hidden" type="submit">Generate Results</button></form><section id="report" class="report hidden"></section></main><script src="script.js"></script></body></html>
