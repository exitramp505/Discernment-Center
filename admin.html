<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Discernment Center Admin</title>
  <link rel="stylesheet" href="style.css?v=82">
</head>
<body>
  <main class="adminMain">
    <section class="hero adminDashboardHero">
      <div class="adminHeroTop">
        <div>
          <div class="eyebrow">Discernment Center</div>
          <h1>Admin Dashboard</h1>
          <p>Review candidate progress, open completed reports, and manage the forms and uploads connected to each candidate file.</p>
        </div>
        <button id="logoutBtn" type="button" class="secondaryBtn adminHeroLogout hidden">Logout</button>
      </div>
    </section>

    <section id="loginCard" class="card authCard">
      <h2>Admin Login</h2>
      <p class="muted">Enter the admin password configured for this Discernment Center dashboard.</p>
      <label>Admin Password
        <input id="adminPassword" type="password" autocomplete="current-password">
      </label>
      <button id="loginBtn" type="button">View Dashboard</button>
      <p id="loginMessage" class="muted"></p>
    </section>

    <section id="dashboard" class="hidden">
      <section class="adminTopRow">
        <div class="adminStat"><strong id="candidateCountStat">0</strong><span>Candidates</span></div>
        <div class="adminStat"><strong id="completedItemCountStat">0</strong><span>Completed Items</span></div>
        <div class="adminControls">
          <label class="srLabel">Search
            <input id="searchInput" placeholder="Search by name, email, phone, state, region, assessment, or form">
          </label>
          <label class="srLabel">Region
            <select id="regionFilter"><option value="">All regions</option></select>
          </label>
          <label class="srLabel">Sort
            <select id="sortSelect">
              <option value="newest">Newest activity</option>
              <option value="oldest">Oldest activity</option>
              <option value="name">Name A-Z</option>
              <option value="region">Region A-Z</option>
              <option value="highest">Highest score</option>
              <option value="lowest">Lowest score</option>
            </select>
          </label>
        </div>
      </section>

      <div class="adminSectionTitle">
        <h2>Candidate Files</h2>
        <p id="countLine" class="muted"></p>
      </div>

      <div id="submissionsList" class="adminCandidateGrid"></div>
      <section id="adminReport" class="report hidden"></section>
    </section>
  </main>
  <script src="ministry-style-report.js?v=82"></script>
<script src="admin.js?v=82"></script>
</body>
</html>
